name: Daily Sovereign Digest

on:
  schedule:
    - cron: '0 6 * * *'   # Every day at 06:00 UTC (9AM Saudi time)
  workflow_dispatch:        # Manual trigger from GitHub UI (one click)

permissions:
  contents: write
  issues: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_digest.py

      - name: Commit and push updated digest
        run: |
          git config user.name "Sovereign News Bot"
          git config user.email "bot@noreply.github.com"
          git add index.html archive/
          git diff --staged --quiet || git commit -m "digest: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily digest failed — ${date}`,
              body: `The daily digest workflow failed on ${date}.\n\n[View failed run](${runUrl})`,
              labels: ['digest-failure'],
            });
